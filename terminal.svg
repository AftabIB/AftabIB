<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" width="680" height="300">
  <defs>
    <style>
      .bg       { fill: #0d1117; }
      .titlebar { fill: #161b22; }
      .dot-r    { fill: #ff5f57; }
      .dot-y    { fill: #febc2e; }
      .dot-g    { fill: #28c840; }
      .title    { fill: #8b949e; font-family: 'Courier New', monospace; font-size: 12px; }
      .prompt   { fill: #38bdf8; font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold; }
      .cmd      { fill: #e2e8f0; font-family: 'Courier New', monospace; font-size: 13px; }
      .out      { fill: #a78bfa; font-family: 'Courier New', monospace; font-size: 13px; }
      .cursor   { fill: #38bdf8; }

      /* Each text line clips from left using a rect that expands */

      /* Line 1: $ whoami  — starts at 0.3s */
      .l1 { clip-path: url(#c1); }
      #cr1 { animation: type1 0.5s steps(8,end) 0.3s both; }
      @keyframes type1 { from { width: 0; } to { width: 200px; } }

      /* Line 2: > Aftab Bhadgaonkar — starts at 1.1s */
      .l2 { clip-path: url(#c2); }
      #cr2 { animation: type2 0.8s steps(22,end) 1.1s both; }
      @keyframes type2 { from { width: 0; } to { width: 280px; } }

      /* Line 3: > Web Developer... — starts at 2.1s */
      .l3 { clip-path: url(#c3); }
      #cr3 { animation: type3 0.9s steps(32,end) 2.1s both; }
      @keyframes type3 { from { width: 0; } to { width: 380px; } }

      /* Line 4: > Building things... — starts at 3.2s */
      .l4 { clip-path: url(#c4); }
      #cr4 { animation: type4 0.9s steps(38,end) 3.2s both; }
      @keyframes type4 { from { width: 0; } to { width: 420px; } }

      /* Line 5: $ cat mission.txt — starts at 4.4s */
      .l5 { clip-path: url(#c5); }
      #cr5 { animation: type5 0.6s steps(17,end) 4.4s both; }
      @keyframes type5 { from { width: 0; } to { width: 220px; } }

      /* Line 6: > Crafting clean... — starts at 5.2s */
      .l6 { clip-path: url(#c6); }
      #cr6 { animation: type6 0.8s steps(31,end) 5.2s both; }
      @keyframes type6 { from { width: 0; } to { width: 360px; } }

      /* Line 7: > scalable software... — starts at 6.2s */
      .l7 { clip-path: url(#c7); }
      #cr7 { animation: type7 0.8s steps(30,end) 6.2s both; }
      @keyframes type7 { from { width: 0; } to { width: 350px; } }

      /* Line 8: > at a time... — starts at 7.2s */
      .l8 { clip-path: url(#c8); }
      #cr8 { animation: type8 0.7s steps(28,end) 7.2s both; }
      @keyframes type8 { from { width: 0; } to { width: 330px; } }

      /* Blinking cursor */
      .blink { animation: blink 1s step-end infinite 8.0s; opacity: 0; }
      @keyframes blink { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
    </style>

    <clipPath id="c1"><rect id="cr1" x="20" y="75"  width="0" height="20"/></clipPath>
    <clipPath id="c2"><rect id="cr2" x="20" y="98"  width="0" height="20"/></clipPath>
    <clipPath id="c3"><rect id="cr3" x="20" y="118" width="0" height="20"/></clipPath>
    <clipPath id="c4"><rect id="cr4" x="20" y="138" width="0" height="20"/></clipPath>
    <clipPath id="c5"><rect id="cr5" x="20" y="165" width="0" height="20"/></clipPath>
    <clipPath id="c6"><rect id="cr6" x="20" y="188" width="0" height="20"/></clipPath>
    <clipPath id="c7"><rect id="cr7" x="20" y="208" width="0" height="20"/></clipPath>
    <clipPath id="c8"><rect id="cr8" x="20" y="228" width="0" height="20"/></clipPath>
  </defs>

  <!-- Window background -->
  <rect width="680" height="300" rx="10" class="bg"/>

  <!-- Titlebar -->
  <rect width="680" height="38" rx="10" class="titlebar"/>
  <rect y="28" width="680" height="10" class="titlebar"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="19" r="6" class="dot-r"/>
  <circle cx="42" cy="19" r="6" class="dot-y"/>
  <circle cx="62" cy="19" r="6" class="dot-g"/>

  <!-- Window title -->
  <text x="340" y="24" text-anchor="middle" class="title">aftab@universe: ~</text>

  <!-- Line 1: prompt + command -->
  <text x="20" y="92" class="l1">
    <tspan class="prompt">aftab@universe</tspan><tspan class="cmd" fill="#8b949e">:~$ </tspan><tspan class="cmd">whoami</tspan>
  </text>

  <!-- Line 2 -->
  <text x="20" y="113" class="l2">
    <tspan class="out">❯ </tspan><tspan class="cmd">Aftab Bhadgaonkar</tspan>
  </text>

  <!-- Line 3 -->
  <text x="20" y="133" class="l3">
    <tspan class="out">❯ </tspan><tspan class="cmd">Web Developer &amp; Software Developer</tspan>
  </text>

  <!-- Line 4 -->
  <text x="20" y="153" class="l4">
    <tspan class="out">❯ </tspan><tspan class="cmd">Building things that live on the internet</tspan>
  </text>

  <!-- spacer line -->

  <!-- Line 5: prompt + command -->
  <text x="20" y="181" class="l5">
    <tspan class="prompt">aftab@universe</tspan><tspan class="cmd" fill="#8b949e">:~$ </tspan><tspan class="cmd">cat mission.txt</tspan>
  </text>

  <!-- Line 6 -->
  <text x="20" y="203" class="l6">
    <tspan class="out">❯ </tspan><tspan class="cmd">Crafting clean, efficient, and</tspan>
  </text>

  <!-- Line 7 -->
  <text x="20" y="223" class="l7">
    <tspan class="out">❯ </tspan><tspan class="cmd">scalable software — one commit</tspan>
  </text>

  <!-- Line 8 -->
  <text x="20" y="243" class="l8">
    <tspan class="out">❯ </tspan><tspan class="cmd">at a time, across the cosmos.</tspan>
  </text>

  <!-- Blinking cursor at end -->
  <rect x="20" y="258" width="8" height="15" rx="1" class="cursor blink"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 285" width="520" height="285">
  <defs>
    <style>
      .bg       { fill: #0a0f0a; }
      .titlebar { fill: #111811; }
      .dot-r    { fill: #ff5f57; }
      .dot-y    { fill: #febc2e; }
      .dot-g    { fill: #28c840; }
      .title    { fill: #4a7c4a; font-family: 'Courier New', monospace; font-size: 11px; }
      .prompt   { fill: #39d353; font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold; }
      .sep      { fill: #2d6a2d; font-family: 'Courier New', monospace; font-size: 13px; }
      .cmd      { fill: #e2ffdc; font-family: 'Courier New', monospace; font-size: 13px; }
      .arrow    { fill: #f0c040; font-family: 'Courier New', monospace; font-size: 13px; }
      .out      { fill: #a8e6a8; font-family: 'Courier New', monospace; font-size: 13px; }
      .cursor   { fill: #39d353; }

      .l1 { clip-path: url(#c1); }
      #cr1 { animation: type1 0.5s steps(8,end) 0.3s both; }
      @keyframes type1 { from { width: 0; } to { width: 480px; } }

      .l2 { clip-path: url(#c2); }
      #cr2 { animation: type2 0.7s steps(22,end) 1.0s both; }
      @keyframes type2 { from { width: 0; } to { width: 480px; } }

      .l3 { clip-path: url(#c3); }
      #cr3 { animation: type3 0.8s steps(38,end) 1.9s both; }
      @keyframes type3 { from { width: 0; } to { width: 480px; } }

      .l4 { clip-path: url(#c4); }
      #cr4 { animation: type4 0.8s steps(42,end) 2.9s both; }
      @keyframes type4 { from { width: 0; } to { width: 480px; } }

      .l5 { clip-path: url(#c5); }
      #cr5 { animation: type5 0.5s steps(17,end) 4.0s both; }
      @keyframes type5 { from { width: 0; } to { width: 480px; } }

      .l6 { clip-path: url(#c6); }
      #cr6 { animation: type6 0.7s steps(33,end) 4.7s both; }
      @keyframes type6 { from { width: 0; } to { width: 480px; } }

      .l7 { clip-path: url(#c7); }
      #cr7 { animation: type7 0.7s steps(31,end) 5.6s both; }
      @keyframes type7 { from { width: 0; } to { width: 480px; } }

      .l8 { clip-path: url(#c8); }
      #cr8 { animation: type8 0.6s steps(30,end) 6.5s both; }
      @keyframes type8 { from { width: 0; } to { width: 480px; } }

      .blink { animation: blink 1s step-end infinite 7.2s; opacity: 0; }
      @keyframes blink { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
    </style>

    <clipPath id="c1"><rect id="cr1" x="16" y="52"  width="0" height="20"/></clipPath>
    <clipPath id="c2"><rect id="cr2" x="16" y="74"  width="0" height="20"/></clipPath>
    <clipPath id="c3"><rect id="cr3" x="16" y="94"  width="0" height="20"/></clipPath>
    <clipPath id="c4"><rect id="cr4" x="16" y="114" width="0" height="20"/></clipPath>
    <clipPath id="c5"><rect id="cr5" x="16" y="142" width="0" height="20"/></clipPath>
    <clipPath id="c6"><rect id="cr6" x="16" y="164" width="0" height="20"/></clipPath>
    <clipPath id="c7"><rect id="cr7" x="16" y="184" width="0" height="20"/></clipPath>
    <clipPath id="c8"><rect id="cr8" x="16" y="204" width="0" height="20"/></clipPath>
  </defs>

  <!-- Window -->
  <rect width="520" height="285" rx="10" class="bg"/>

  <!-- Titlebar -->
  <rect width="520" height="36" rx="10" class="titlebar"/>
  <rect y="26" width="520" height="10" class="titlebar"/>

  <!-- Border glow line under titlebar -->
  <line x1="0" y1="36" x2="520" y2="36" stroke="#1a3d1a" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="5.5" class="dot-r"/>
  <circle cx="38" cy="18" r="5.5" class="dot-y"/>
  <circle cx="56" cy="18" r="5.5" class="dot-g"/>

  <!-- Title -->
  <text x="260" y="23" text-anchor="middle" class="title">~ aftab@cosmos</text>

  <!-- Line 1: $ whoami -->
  <text x="16" y="68" class="l1">
    <tspan class="prompt">➜</tspan><tspan class="sep">  ~ </tspan><tspan class="cmd">whoami</tspan>
  </text>

  <!-- Line 2: output -->
  <text x="16" y="89" class="l2">
    <tspan class="arrow">→ </tspan><tspan class="out">Aftab Bhadgaonkar</tspan>
  </text>

  <!-- Line 3: output -->
  <text x="16" y="109" class="l3">
    <tspan class="arrow">→ </tspan><tspan class="out">Web Developer &amp; Software Engineer</tspan>
  </text>

  <!-- Line 4: output -->
  <text x="16" y="129" class="l4">
    <tspan class="arrow">→ </tspan><tspan class="out">Building things that live on the internet</tspan>
  </text>

  <!-- Line 5: $ cat mission.txt -->
  <text x="16" y="157" class="l5">
    <tspan class="prompt">➜</tspan><tspan class="sep">  ~ </tspan><tspan class="cmd">cat mission.txt</tspan>
  </text>

  <!-- Line 6 -->
  <text x="16" y="179" class="l6">
    <tspan class="arrow">→ </tspan><tspan class="out">&#x1F4A1; Hungry to build, learn &amp; grow</tspan>
  </text>

  <!-- Line 7 -->
  <text x="16" y="199" class="l7">
    <tspan class="arrow">→ </tspan><tspan class="out">&#x1F91D; Open to exciting opportunities</tspan>
  </text>

  <!-- Line 8 -->
  <text x="16" y="219" class="l8">
    <tspan class="arrow">→ </tspan><tspan class="out">&#x1F680; Let&apos;s ship great products together!</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="16" y="232" width="8" height="14" rx="1" class="cursor blink"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 800 800" width="800" height="800">

  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#020b18"/>
    </radialGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff9c4"/>
      <stop offset="35%"  stop-color="#ffd600"/>
      <stop offset="70%"  stop-color="#ff6f00"/>
      <stop offset="100%" stop-color="#e65100" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iconglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.8">
    <circle cx="42"  cy="60"  r="1.2"/><circle cx="130" cy="30"  r="0.8"/>
    <circle cx="210" cy="90"  r="1.5"/><circle cx="320" cy="15"  r="1"/>
    <circle cx="450" cy="50"  r="0.7"/><circle cx="560" cy="25"  r="1.3"/>
    <circle cx="670" cy="75"  r="0.9"/><circle cx="750" cy="40"  r="1.1"/>
    <circle cx="780" cy="130" r="0.7"/><circle cx="25"  cy="190" r="1.2"/>
    <circle cx="80"  cy="280" r="0.8"/><circle cx="15"  cy="370" r="1.4"/>
    <circle cx="55"  cy="460" r="0.9"/><circle cx="30"  cy="560" r="1.1"/>
    <circle cx="90"  cy="650" r="0.7"/><circle cx="20"  cy="740" r="1.3"/>
    <circle cx="150" cy="780" r="0.8"/><circle cx="270" cy="760" r="1.2"/>
    <circle cx="390" cy="790" r="0.6"/><circle cx="510" cy="770" r="1.0"/>
    <circle cx="630" cy="755" r="1.4"/><circle cx="730" cy="780" r="0.8"/>
    <circle cx="775" cy="700" r="1.1"/><circle cx="760" cy="590" r="0.7"/>
    <circle cx="790" cy="480" r="1.3"/><circle cx="770" cy="360" r="0.9"/>
    <circle cx="755" cy="250" r="1.2"/><circle cx="185" cy="165" r="0.8"/>
    <circle cx="620" cy="180" r="1.0"/><circle cx="340" cy="120" r="0.7"/>
    <circle cx="480" cy="140" r="1.2"/><circle cx="160" cy="530" r="0.9"/>
    <circle cx="640" cy="620" r="1.1"/><circle cx="700" cy="430" r="0.8"/>
  </g>

  <!-- Twinkling stars -->
  <circle cx="95"  cy="145" r="1.5" fill="white">
    <animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="590" cy="95"  r="1.5" fill="white">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="300" r="1.5" fill="white">
    <animate attributeName="opacity" values="1;0.1;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="690" r="1.5" fill="white">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.9s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbit rings -->
  <circle cx="400" cy="400" r="95"  fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.18"/>
  <circle cx="400" cy="400" r="160" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="400" cy="400" r="230" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
  <circle cx="400" cy="400" r="300" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.09"/>

  <!-- Sun glow halo -->
  <circle cx="400" cy="400" r="70" fill="#ff8f00" opacity="0.12" filter="url(#softglow)"/>
  <circle cx="400" cy="400" r="55" fill="#ffd600" opacity="0.18" filter="url(#softglow)"/>

  <!-- Sun core -->
  <circle cx="400" cy="400" r="42" fill="url(#sunGrad)" filter="url(#glow)"/>
  <!-- Sun rays -->
  <g transform="translate(400,400)" stroke="#ffd600" stroke-width="1.5" opacity="0.6">
    <line x1="0" y1="-50" x2="0" y2="-58"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/></line>
    <line x1="35" y1="-35" x2="41" y2="-41"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.8s" repeatCount="indefinite"/></line>
    <line x1="50" y1="0" x2="58" y2="0"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.3s" repeatCount="indefinite"/></line>
    <line x1="35" y1="35" x2="41" y2="41"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.0s" repeatCount="indefinite"/></line>
    <line x1="0" y1="50" x2="0" y2="58"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.6s" repeatCount="indefinite"/></line>
    <line x1="-35" y1="35" x2="-41" y2="41"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.4s" repeatCount="indefinite"/></line>
    <line x1="-50" y1="0" x2="-58" y2="0"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.9s" repeatCount="indefinite"/></line>
    <line x1="-35" y1="-35" x2="-41" y2="-41"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.7s" repeatCount="indefinite"/></line>
  </g>
  <!-- Sun label -->
  <text x="400" y="456" text-anchor="middle" fill="#ffd600" font-size="13" font-family="monospace" opacity="0.85">{ dev }</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ORBIT 1 — r=95 — Languages (8s) -->
  <!-- JS -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="0 400 400" to="360 400 400" dur="8s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=js" x="477" y="377" width="36" height="36" filter="url(#iconglow)"/>
  </g>
  <!-- TS — offset 90deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="90 400 400" to="450 400 400" dur="8s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=ts" x="477" y="377" width="36" height="36" filter="url(#iconglow)"/>
  </g>
  <!-- Python — offset 180deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="180 400 400" to="540 400 400" dur="8s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=python" x="477" y="377" width="36" height="36" filter="url(#iconglow)"/>
  </g>
  <!-- C++ — offset 270deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="270 400 400" to="630 400 400" dur="8s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=cpp" x="477" y="377" width="36" height="36" filter="url(#iconglow)"/>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ORBIT 2 — r=160 — Frontend (14s) -->
  <!-- React -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="0 400 400" to="360 400 400" dur="14s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=react" x="542" y="377" width="38" height="38" filter="url(#iconglow)"/>
  </g>
  <!-- Next.js — offset 72deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="72 400 400" to="432 400 400" dur="14s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=nextjs" x="542" y="377" width="38" height="38" filter="url(#iconglow)"/>
  </g>
  <!-- Tailwind — offset 144deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="144 400 400" to="504 400 400" dur="14s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=tailwind" x="542" y="377" width="38" height="38" filter="url(#iconglow)"/>
  </g>
  <!-- HTML — offset 216deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="216 400 400" to="576 400 400" dur="14s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=html" x="542" y="377" width="38" height="38" filter="url(#iconglow)"/>
  </g>
  <!-- CSS — offset 288deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="288 400 400" to="648 400 400" dur="14s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=css" x="542" y="377" width="38" height="38" filter="url(#iconglow)"/>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ORBIT 3 — r=230 — Backend & DB (22s) -->
  <!-- Node.js -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="0 400 400" to="360 400 400" dur="22s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=nodejs" x="611" y="377" width="40" height="40" filter="url(#iconglow)"/>
  </g>
  <!-- Express — offset 60deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="60 400 400" to="420 400 400" dur="22s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=express" x="611" y="377" width="40" height="40" filter="url(#iconglow)"/>
  </g>
  <!-- FastAPI — offset 120deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="120 400 400" to="480 400 400" dur="22s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=fastapi" x="611" y="377" width="40" height="40" filter="url(#iconglow)"/>
  </g>
  <!-- MongoDB — offset 180deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="180 400 400" to="540 400 400" dur="22s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=mongodb" x="611" y="377" width="40" height="40" filter="url(#iconglow)"/>
  </g>
  <!-- MySQL — offset 240deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="240 400 400" to="600 400 400" dur="22s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=mysql" x="611" y="377" width="40" height="40" filter="url(#iconglow)"/>
  </g>
  <!-- PostgreSQL — offset 300deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="300 400 400" to="660 400 400" dur="22s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=postgres" x="611" y="377" width="40" height="40" filter="url(#iconglow)"/>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ORBIT 4 — r=300 — Tools (32s) -->
  <!-- Git -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="0 400 400" to="360 400 400" dur="32s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=git" x="681" y="377" width="38" height="38" filter="url(#iconglow)"/>
  </g>
  <!-- GitHub — offset 51deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="51 400 400" to="411 400 400" dur="32s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=github" x="681" y="377" width="38" height="38" filter="url(#iconglow)"/>
  </g>
  <!-- VS Code — offset 102deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="102 400 400" to="462 400 400" dur="32s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=vscode" x="681" y="377" width="38" height="38" filter="url(#iconglow)"/>
  </g>
  <!-- Postman — offset 153deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="153 400 400" to="513 400 400" dur="32s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=postman" x="681" y="377" width="38" height="38" filter="url(#iconglow)"/>
  </g>
  <!-- Figma — offset 204deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="204 400 400" to="564 400 400" dur="32s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=figma" x="681" y="377" width="38" height="38" filter="url(#iconglow)"/>
  </g>
  <!-- Docker — offset 255deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="255 400 400" to="615 400 400" dur="32s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=docker" x="681" y="377" width="38" height="38" filter="url(#iconglow)"/>
  </g>
  <!-- Photoshop — offset 306deg -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="306 400 400" to="666 400 400" dur="32s" repeatCount="indefinite"/>
    <image href="https://skillicons.dev/icons?i=ps" x="681" y="377" width="38" height="38" filter="url(#iconglow)"/>
  </g>

</svg>
